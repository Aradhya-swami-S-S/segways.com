<body>
    <div class="navbar-container">

        <nav class="navbar" style="top: 0;">
            <div class="nav-logo">
                <img src="../images/sports_motorsports_FILL0_wght400_GRAD0_opsz48.png" alt="brand-logo" width="48px">

    <div class="profile">
        <div class="image">
            <img class="profile-image" src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" alt="Profile Image"
                width="160px">
        </div>

        <div class="profile-info">
            <form action="">
                <label for="email">Email</label><br>
                <input type="email" name="email" id="email" value="segwaysorg@gmail.com"><br>

                <label for="gender">Gender</label><br>
                <input type="text" name="gender" id="gender" value="Male"><br>

                <label for="dob">Date of Birth</label>
                <p class="dob">12-12-2020</p>

                <label for="text">Member Since</label>
                <p class="member">2019</p>

                <label for="text">Emergency Contact</label>
                <p class="emergency">bla bla bla bla bla bla</p>
            </form>
        </div>
    </div>
