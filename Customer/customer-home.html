<!DOCTYPE html>

    <!-- Font awesome -->

    <link rel="stylesheet" href="../Style-Sheets/style-main.css">

    <link rel="stylesheet" href="../Style-Sheets/customer-home.css">

    <title>Customer-Home</title>

</head>

<body>
    <div id="container">


        <div class="navbar-container">

            <nav class="navbar" style="top: 0;">
                <div class="nav-logo">
                    <img src="../images/sports_motorsports_FILL0_wght400_GRAD0_opsz48.png" alt="brand-logo"
                        width="48px">
                    <h3>segways</h3>
                </div>

                <div class="nav-items">
                    <ul class="nav">
                        <li class="item-1"><a href="#home">Home</a> </li>
                        <li class="item"><a href="#about">About Us</a></li>
                        <li class="item"><a href="#safety">Safety</a></li>
                        <li class="item"><a href="/Contact Us/contact.html">Contact Us</a></li>
                    </ul>

                </div>
                <div class="dropdown">
                    <a class="login-link" href="#"><span>Login</span>
                        <i class="fa-solid fa-caret-down"></i></a>
                    <div class="drop-items">
                        <a href="/Captain/driverlogin.html"><span>Captain</span></a>
                        <a href="/Customer/customerlogin.html"><span>User</span></a>
                    </div>
                </div>
            </nav>
        </div>

        <div class="location">
            <div class="destination-back">
                <h1>Book Your Cab Now!</h1>
                <div class="destination">
                    <form action="">
                        <div class="inputs">
                            <h2>Get a ride</h2>
                            <input type="text" id="from" placeholder="Pickup Location">
                            <input type="text" id="to" placeholder="Dropoff Location">
                            <input type="date" id="date">
                            <input type="time" id="time" placeholder="Timing">
                            <button class="search">SEARCH</button>
                        </div>
                    </form>

                </div>
            </div>

            <div class="map">
                <iframe
                    src="https://www.google.com/maps/embed?pb=!1m10!1m8!1m3!1d124415.49994111672!2d77.6142848!3d12.9728512!3m2!1i1024!2i768!4f13.1!5e0!3m2!1sen!2sin!4v1681630125559!5m2!1sen!2sin"
                    width="720" height="550" style="border:0;" allowfullscreen="" loading="lazy"
                    referrerpolicy="no-referrer-when-downgrade">
                </iframe>
            </div>

        </div>





    </div>
