        rel="stylesheet">
    <title>segways-Contact Us</title>
    <link rel="shortcut icon" href="/images/favicon.ico" type="image/x-icon" >
</head>

<body>
    <div class="conatiner">
        <div class="navbar-container" >
            <nav class="navbar" style="padding: 0.5rem; top: 0;">
                <div class="nav-logo">
                    <img src="/images/sports_motorsports_FILL0_wght400_GRAD0_opsz48.png" alt="brand-logo" width="48px">
                    <h3>segways</h3>
                </div>

                <div class="nav-items">
                    <ul class="nav">
                        <li class="item-1"><a href="/index.html">Home</a> </li>
                        <li class="item"><a href="#about">About Us</a></li>
                        <li class="item"><a href="#safety">Safety</a></li>
                        <li class="item"><a href="./Contact Us/contact.html">Contact Us</a></li>
                    </ul>
                </div>
            </nav>
        </div>

        <div class="container-back">
            <div class="form">
                <h1>Get in touch</h1>
                <form action="">
                    <label for="text" class="name-lbl">Name</label><br>
                    <input type="text" name="fname" id="fname" placeholder="First Nanme">
                    <input type="text" name="lname" id="lname" placeholder="Last Name"><br>

                    <label for="email" class="eml-lbl">Email</label><br>
                    <input type="email" name="email" id="email" placeholder="Enter Your Email "><br>

                    <label for="message" class="message">Message</label><br>
                    <textarea id="message" name="Message" rows="6" cols="50"></textarea><br>

                    <button class="submit">SUBMIT</button>

                </form>
            </div>

        </div>


    </div>
</body>
