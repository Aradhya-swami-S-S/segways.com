<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/Style-Sheets/contact.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Albert+Sans:wght@500&family=Raleway&display=swap" rel="stylesheet">
    <title>Contact Us</title>
</head>

<body>
    <div class="conatiner">
        <div class="navbar-container">

            <div class="navbar">
                <div class="nav-logo">
                    <img src="/images/sports_motorsports_FILL0_wght400_GRAD0_opsz48.png" alt="brand-logo" width="45px">
                    <h3>segways</h3>
                </div>
                <ul class="nav">
                    <li class="item-1"><a href="#home">Home</a> </li>
                    <li class="item"><a href="#about">About Us</a></li>
                    <li class="item"><a href="#safety">Safety</a></li>
                    
                </ul>
            </div>
        </div>
        <div class="container-back">
           
                <div class="form">
                    <h1>Get in touch</h1>
                    <form action="">
                        <label for="text" class="name-lbl">Name</label><br>
                        <input type="text" name="fname" id="fname" placeholder="First Nanme">
                        <input type="text" name="lname" id="lname" placeholder="Last Name"><br>

                        <label for="email" class="eml-lbl">Email</label><br>
                        <input type="email" name="email" id="email" placeholder="Enter Your Email "><br>

                        <label for="message" class="message">Message</label><br>
                        <textarea id="message" name="Message" rows="6" cols="50"></textarea><br>

                        <button class="submit">SUBMIT</button>

                    </form>
                </div>
           
        </div>


    </div>
</body>

</html>
